<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>閒人案內所 ｜ 官方傳送門</title>
<style>
:root {
--bg-dark: #06040a;
--neon-gold: #f59e0b;
--neon-purple: #a855f7;
--neon-orange: #f97316;
--neon-blue: #06b6d4;
--text-light: #ffffff;
--text-gray: #a7a2b5;
--card-glass: rgba(15, 11, 25, 0.75);
--border-glow: rgba(168, 85, 247, 0.25);
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
-webkit-tap-highlight-color: transparent;
}

body {
background-color: var(--bg-dark);
background-image:
radial-gradient(circle at 50% 0%, rgba(168, 85, 247, 0.2) 0%, transparent 50%),
radial-gradient(circle at 100% 30%, rgba(249, 115, 22, 0.15) 0%, transparent 40%),
radial-gradient(circle at 0% 80%, rgba(138, 75, 245, 0.15) 0%, transparent 50%);
color: var(--text-light);
min-height: 100vh;
display: flex;
justify-content: center;
align-items: flex-start;
padding: 40px 15px;
overflow-x: hidden;
}

.container {
width: 100%;
max-width: 480px;
text-align: center;
position: relative;
}

/* 華麗動態標頭 */
.header {
margin-bottom: 25px;
}

.logo-container {
position: relative;
width: 90px;
height: 90px;
margin: 0 auto 15px;
}

.logo-pulse {
position: absolute;
width: 100%; height: 100%;
border-radius: 50%;
background: linear-gradient(135deg, var(--neon-purple), var(--neon-orange));
animation: pulseGlow 2s infinite alternate;
filter: blur(8px);
opacity: 0.8;
}

.logo-inner {
position: absolute;
top: 2px; left: 2px; right: 2px; bottom: 2px;
background: #120c1f;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 38px;
border: 1px solid rgba(255, 255, 255, 0.1);
box-shadow: inset 0 0 15px rgba(168, 85, 247, 0.4);
}

.title {
font-size: 28px;
font-weight: 900;
letter-spacing: 3px;
margin-bottom: 6px;
background: linear-gradient(90deg, #ffffff, var(--neon-gold), var(--neon-orange));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
filter: drop-shadow(0 2px 8px rgba(245, 158, 11, 0.3));
}

.subtitle {
font-size: 12px;
color: var(--text-gray);
letter-spacing: 3px;
text-transform: uppercase;
}

/* 三分頁導航按鈕 (3 Tabs) */
.tab-navigation {
display: flex;
background: rgba(255, 255, 255, 0.03);
border: 1px solid rgba(255, 255, 255, 0.08);
border-radius: 14px;
padding: 4px;
margin-bottom: 30px;
backdrop-filter: blur(10px);
gap: 4px;
}

.tab-btn {
flex: 1;
padding: 10px 4px;
background: none;
border: none;
color: var(--text-gray);
font-size: 12px;
font-weight: 700;
border-radius: 10px;
cursor: pointer;
transition: all 0.3s ease;
white-space: nowrap;
}

.tab-btn.active {
color: #ffffff;
background: linear-gradient(135deg, rgba(168, 85, 247, 0.3) 0%, rgba(249, 115, 22, 0.2) 100%);
border: 1px solid rgba(168, 85, 247, 0.3);
box-shadow: 0 0 12px rgba(168, 85, 247, 0.2);
text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
}

/* 內容面板控制 */
.tab-panel {
display: none;
animation: fadeIn 0.4s ease forwards;
}

.tab-panel.active {
display: block;
}

/* 霓虹發光卡片盒 */
.card-box {
background: var(--card-glass);
border: 1px solid var(--border-glow);
border-radius: 24px;
padding: 24px 16px;
margin-bottom: 25px;
backdrop-filter: blur(25px);
-webkit-backdrop-filter: blur(25px);
box-shadow: 0 0 25px rgba(168, 85, 247, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.02);
text-align: left;
}

.card-box.phone-box {
border-color: rgba(6, 182, 212, 0.4);
box-shadow: 0 0 25px rgba(6, 182, 212, 0.2);
}

.card-header {
font-size: 14px;
font-weight: 800;
color: var(--neon-gold);
margin-bottom: 18px;
display: flex;
align-items: center;
gap: 10px;
letter-spacing: 2px;
text-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
}

.card-header.blue-header {
color: var(--neon-blue);
text-shadow: 0 0 10px rgba(6, 182, 212, 0.4);
}

.card-header::after {
content: '';
flex-grow: 1;
height: 2px;
background: linear-gradient(to right, rgba(245, 158, 11, 0.5), transparent);
}

.card-header.blue-header::after {
background: linear-gradient(to right, rgba(6, 182, 212, 0.5), transparent);
}

/* 大按鈕樣式 */
.link-card {
display: flex;
align-items: center;
padding: 16px 20px;
background: rgba(255, 255, 255, 0.03);
border: 1px solid rgba(255, 255, 255, 0.08);
border-radius: 16px;
text-decoration: none;
color: #ffffff;
margin-bottom: 14px;
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
position: relative;
overflow: hidden;
backdrop-filter: blur(10px);
}

.link-card:hover, .link-card:active {
background: rgba(255, 255, 255, 0.09);
border-color: rgba(255, 255, 255, 0.2);
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
}

.link-card.primary-style {
border-color: rgba(138, 75, 245, 0.4);
background: linear-gradient(90deg, rgba(138, 75, 245, 0.1) 0%, rgba(255, 255, 255, 0.03) 100%);
}

.link-card.primary-style:hover {
border-color: rgba(138, 75, 245, 0.8);
box-shadow: 0 6px 20px rgba(138, 75, 245, 0.2);
}

.link-icon {
font-size: 22px;
margin-right: 15px;
width: 28px;
text-align: center;
}

.link-content {
text-align: left;
flex-grow: 1;
}

.link-title {
font-size: 15px;
font-weight: 700;
margin-bottom: 2px;
}

.link-desc {
font-size: 12px;
color: #8e8e9c;
}

.badge {
font-size: 10px;
padding: 3px 8px;
border-radius: 20px;
font-weight: 600;
margin-left: 10px;
background-color: rgba(235, 94, 40, 0.2);
color: #ff8a5c;
border: 1px solid rgba(235, 94, 40, 0.3);
}

/* 專人聯絡雙欄排版 */
.contact-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
}

.contact-card {
display: flex;
flex-direction: column;
align-items: center;
padding: 18px 10px;
background: rgba(255, 255, 255, 0.03);
border: 1px solid rgba(255, 255, 255, 0.06);
border-radius: 16px;
text-decoration: none;
color: #ffffff;
transition: all 0.2s ease;
}

.contact-card:hover, .contact-card:active {
background: rgba(255, 255, 255, 0.08);
border-color: rgba(255, 255, 255, 0.15);
transform: translateY(-2px);
}

.contact-avatar {
width: 46px;
height: 46px;
border-radius: 50%;
background: #2a2a35;
display: flex;
align-items: center;
justify-content: center;
font-size: 20px;
margin-bottom: 8px;
border: 1px solid rgba(255, 255, 255, 0.1);
}

/* 電話專用頻道獨立按鈕 */
.primary-card {
display: flex;
align-items: center;
padding: 20px;
background: linear-gradient(90deg, rgba(6, 182, 212, 0.15) 0%, rgba(255, 255, 255, 0.02) 100%);
border: 1.5px solid var(--neon-blue);
border-radius: 18px;
color: #ffffff;
text-decoration: none;
transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
margin-bottom: 18px;
}

.primary-card:hover, .primary-card:active {
background: linear-gradient(90deg, rgba(6, 182, 212, 0.25) 0%, rgba(168, 85, 247, 0.1) 100%);
border-color: #ffffff;
transform: translateY(-3px);
box-shadow: 0 0 25px rgba(6, 182, 212, 0.4);
}

.primary-icon {
font-size: 26px;
margin-right: 15px;
filter: drop-shadow(0 0 5px var(--neon-blue));
}

/* 5欄網格房間按鈕 */
.grid-rooms {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 8px;
}

.room-item {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 52px;
background: rgba(255, 255, 255, 0.03);
border: 1px solid rgba(255, 255, 255, 0.08);
border-radius: 14px;
color: #e2dbe9;
text-decoration: none;
font-size: 14px;
font-weight: 700;
transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
}

.room-item span {
font-size: 8px;
color: #7d758a;
font-weight: 500;
margin-top: 2px;
}

.room-item:hover, .room-item:active {
background: linear-gradient(135deg, rgba(168, 85, 247, 0.2) 0%, rgba(249, 115, 22, 0.2) 100%);
border-color: var(--neon-orange);
color: #ffffff;
transform: translateY(-4px) scale(1.05);
box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
}

/* 語音對談行條 */
.talk-list {
display: flex;
flex-direction: column;
gap: 12px;
}

.talk-item {
display: flex;
align-items: center;
padding: 16px 20px;
background: linear-gradient(90deg, rgba(168, 85, 247, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
border: 1px solid rgba(168, 85, 247, 0.2);
border-radius: 18px;
color: #ffffff;
text-decoration: none;
transition: all 0.3s ease;
position: relative;
overflow: hidden;
}

.talk-item:hover, .talk-item:active {
border-color: var(--neon-purple);
background: linear-gradient(90deg, rgba(168, 85, 247, 0.15) 0%, rgba(249, 115, 22, 0.05) 100%);
transform: translateX(4px);
box-shadow: 0 0 15px rgba(168, 85, 247, 0.25);
}

/* 政策文件樣式 */
.policy-content {
line-height: 1.7;
font-size: 14px;
color: #e2dbe9;
}

.policy-section {
margin-bottom: 25px;
}

.policy-section-title {
font-size: 16px;
font-weight: 800;
color: var(--neon-gold);
margin-bottom: 12px;
border-left: 3px solid var(--neon-gold);
padding-left: 10px;
}

.policy-list {
list-style: none;
display: flex;
flex-direction: column;
gap: 12px;
}

.policy-item {
background: rgba(255, 255, 255, 0.02);
border: 1px solid rgba(255, 255, 255, 0.05);
border-radius: 12px;
padding: 14px 16px;
}

.policy-item-title {
font-weight: 700;
color: #ffffff;
margin-bottom: 4px;
}

.policy-item-desc {
color: #b1a9bc;
font-size: 13px;
}

.highlight-text {
color: #f43f5e;
font-weight: 700;
}

.footer {
margin-top: 40px;
font-size: 11px;
color: #554e63;
letter-spacing: 2px;
}

@keyframes pulseGlow {
0% { transform: scale(0.96); box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
100% { transform: scale(1.04); box-shadow: 0 0 30px rgba(249, 115, 22, 0.6); }
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="container">

<!-- 賽博華麗標頭 -->
<div class="header">
<div class="logo-container">
<div class="logo-pulse"></div>
<div class="logo-inner">👻</div>
</div>
<h1 class="title">閒人案內所</h1>
<p class="subtitle">VIP Lounge Portal</p>
</div>

<!-- 3分頁切換導航 (3 Tabs) -->
<div class="tab-navigation">
<button class="tab-btn active" onclick="switchTab('home')">Lounge 導引門</button>
<button class="tab-btn" onclick="switchTab('rooms')">VIP 招待所</button>
<button class="tab-btn" onclick="switchTab('policy'
